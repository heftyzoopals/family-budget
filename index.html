      <div class="modal-actions">
        <button class="btn-cancel" id="modal-cancel">Cancel</button>
        <button class="btn-save" id="modal-save">Set end date</button>
      </div>
    </div>
  </div>`;

  document.getElementById('modal-cancel').addEventListener('click', closeModal);
  document.getElementById('modal-backdrop').addEventListener('click', ev => { if (ev.target.id==='modal-backdrop') closeModal(); });
  document.getElementById('modal-save').addEventListener('click', async () => {
    const endDate = document.getElementById('f-end-date').value;
    if (!endDate) return;
    await set(ref(db, `recurring/${baseId}/endDate`), endDate);
    closeModal();
  });
}

function openInstanceEditModal(baseId, scheduledDate) {
  const r = state.recurring[baseId];
  if (!r) return;
  const existing = (r.overrides && r.overrides[scheduledDate]) || {};
  // Current effective values (override takes priority over rule)
  const curName     = existing.name     || r.name;
  const curAmount   = existing.amount   !== undefined ? existing.amount : r.amount;
  const curCategory = existing.category || r.category;
  const curAddedBy  = existing.addedBy  || '';
  const curDate     = existing.date     || scheduledDate; // may already be rescheduled
  const prettyDate  = new Date(scheduledDate + 'T00:00:00').toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' });

  const catOptions = ['Housing','Food & dining','Transportation','Utilities','Healthcare','Entertainment','Shopping','Savings','Income','Other'];
  const catOpts = catOptions.map(c => `<option ${c === curCategory ? 'selected' : ''}>${c}</option>`).join('');

  document.getElementById('modal-root').innerHTML = `
  <div class="modal-backdrop" id="modal-backdrop">
    <div class="modal">
      <h2>Edit this occurrence</h2>
      <p style="font-size:12px;color:var(--text-2);margin-bottom:1rem;line-height:1.5">
        Editing the <strong>${prettyDate}</strong> occurrence only. The recurring rule stays unchanged.
      </p>
      <div class="form-group"><label>Date</label><input id="f-date" type="date" value="${curDate}" /></div>
      <div class="form-group"><label>Name</label><input id="f-name" value="${curName}" /></div>
      <div class="form-group"><label>Amount ($)</label><input id="f-amount" type="number" min="0" step="0.01" value="${curAmount}" /></div>
      <div class="form-group"><label>Category</label><select id="f-cat">${catOpts}</select></div>
      <div class="form-group"><label>Added by</label><input id="f-by" placeholder="Your name (optional)" value="${curAddedBy}" /></div>
      ${Object.keys(existing).length > 0 ? `
      <div style="margin-bottom:12px">
        <button id="clear-override-btn" style="background:none;border:1px solid var(--border-strong);border-radius:var(--radius);padding:6px 12px;font-size:12px;font-family:inherit;cursor:pointer;color:var(--text-3);min-height:36px">
          ↩ Reset to recurring rule defaults
        </button>
      </div>` : ''}
      <div class="modal-actions">
        <button class="btn-cancel" id="modal-cancel">Cancel</button>
        <button class="btn-save" id="modal-save">Save for this occurrence</button>
      </div>
    </div>
  </div>`;

  document.getElementById('modal-cancel').addEventListener('click', closeModal);
  document.getElementById('modal-backdrop').addEventListener('click', ev => { if (ev.target.id === 'modal-backdrop') closeModal(); });

  const clearBtn = document.getElementById('clear-override-btn');
  if (clearBtn) {
    clearBtn.addEventListener('click', async () => {
      await remove(ref(db, `recurring/${baseId}/overrides/${scheduledDate}`));
      closeModal();
    });
  }

  document.getElementById('modal-save').addEventListener('click', async () => {
    const name     = document.getElementById('f-name').value.trim();
    const amount   = parseFloat(document.getElementById('f-amount').value);
    const newDate  = document.getElementById('f-date').value;
    const category = document.getElementById('f-cat').value;
    const addedBy  = document.getElementById('f-by').value.trim();
    if (!name || isNaN(amount) || !newDate) return;
    const override = { name, amount, category };
    if (addedBy) override.addedBy = addedBy;
    // Only store date override if it actually differs from scheduled date
    if (newDate !== scheduledDate) override.date = newDate;
    // Save override keyed by the original scheduled date
    await set(ref(db, `recurring/${baseId}/overrides/${scheduledDate}`), override);
    closeModal();
  });
}

function closeModal() { document.getElementById('modal-root').innerHTML = ''; }

// ─── Event delegation ─────────────────────
function attachApp() {
  document.addEventListener('click', handleClick);
}

async function handleClick(e) {
  // Zoom buttons
  const zoomBtn = e.target.closest('[data-zoom]');
  if (zoomBtn) {
    state.zoom = zoomBtn.dataset.zoom;
    if (state.zoom === 'day' && !state.selectedDate) state.selectedDate = todayStr();
    if (state.zoom === 'week') state.currentWeekStart = null; // reset to current week
    render(); return;
  }

  // Year/quarter cell → drill into month
  const zoomNav = e.target.closest('[data-zoom-nav]');
  if (zoomNav) {
    state.currentMonth = parseInt(zoomNav.dataset.zmMonth);
    state.currentYear  = parseInt(zoomNav.dataset.zmYear);
    state.zoom = zoomNav.dataset.zoomNav; // 'month'
    state.selectedDate = null;
    render(); return;
  }

  // Week cell → select day (and optionally drill to day view on double-tap pattern: just select for now)
  const weekDay = e.target.closest('[data-zoom-day]');
  if (weekDay) {
    state.selectedDate = weekDay.dataset.zoomDay;
    render(); return;
  }

  // Theme toggle
  if (e.target.closest('#theme-btn')) { toggleTheme(); render(); return; }

  // Set account balance
  if (e.target.closest('[data-action="set-balance"]')) { openBalanceModal(); return; }

  // Tab switching
  const tab = e.target.closest('[data-view]');
  if (tab) { state.view = tab.dataset.view; state.selectedDate = null; render(); return; }

  // Calendar day select
  const cell = e.target.closest('.cal-cell[data-date]');
  if (cell) {
    state.selectedDate = state.selectedDate === cell.dataset.date ? null : cell.dataset.date;
    render(); return;
  }

  // Add entry
  const addBtn = e.target.closest('[data-action="add-entry"]');
  if (addBtn) { openEntryModal(addBtn.dataset.date || todayStr()); return; }

  // Add recurring
  if (e.target.closest('[data-action="add-recurring"]')) { openRecurModal(); return; }

  // Edit recurring
  const editRecur = e.target.closest('[data-action="edit-recurring"]');
  if (editRecur) { openRecurModal(editRecur.dataset.id); return; }

  // Edit a single recurring instance
  const editInstance = e.target.closest('[data-action="edit-instance"]');
  if (editInstance) { openInstanceEditModal(editInstance.dataset.baseId, editInstance.dataset.date); return; }

  // Delete/skip a single recurring instance
  const delInstance = e.target.closest('[data-action="del-instance"]');
  if (delInstance) { openInstanceDeleteModal(delInstance.dataset.baseId, delInstance.dataset.date); return; }

  // Edit one-time entry
  const editEntry = e.target.closest('[data-action="edit-entry"]');
  if (editEntry) {
    const entry = state.entries[editEntry.dataset.id];
    if (entry) openEntryModal(entry.date, entry);
    return;
  }

  // Delete entry
  const delEntry = e.target.closest('[data-action="del-entry"]');
  if (delEntry) { remove(ref(db, 'entries/' + delEntry.dataset.id)); return; }

  // Delete recurring
  const delRecur = e.target.closest('[data-action="del-recurring"]');
  if (delRecur) { remove(ref(db, 'recurring/' + delRecur.dataset.id)); return; }

  // Disconnect
  if (e.target.closest('#disconnect-btn')) {
    if (confirm('Disconnect from Firebase? Your data stays safe in the database.')) {
      localStorage.removeItem(FIREBASE_CONFIG_KEY);
      state.synced = false;
      db = null;
      render();
    }
    return;
  }

  // Month nav
  if (e.target.closest('#prev-btn')) {
    if (state.zoom === 'month') await saveCarryForward(state.currentYear, state.currentMonth);
    navigateZoom(-1);
    state.selectedDate = null; render(); return;
  }
  if (e.target.closest('#next-btn')) {
    if (state.zoom === 'month') await saveCarryForward(state.currentYear, state.currentMonth);
    navigateZoom(+1);
    state.selectedDate = null; render(); return;
  }
}

// ─── Boot ─────────────────────────────────
const savedConfig = loadConfig();
if (savedConfig) {
  initFirebase(savedConfig);
} else {
  render();
}
</script>
</body>
</html>
