<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Family Budget" />
  <meta name="theme-color" content="#f7f7f5" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#141413" media="(prefers-color-scheme: dark)" />
  <title>Family Budget</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #f7f7f5;
      --surface:    #ffffff;
      --surface-2:  #f2f2f0;
      --border:     #e4e4e0;
      --border-strong: #d0d0ca;
      --text:       #1a1a18;
      --text-2:     #5a5a56;
      --text-3:     #9a9a94;
      --green:      #16a34a;
      --green-bg:   #dcfce7;
      --red:        #dc2626;
      --red-bg:     #fee2e2;
      --blue:       #2563eb;
      --blue-bg:    #dbeafe;
      --purple:     #7c3aed;
      --purple-bg:  #ede9fe;
      --radius:     8px;
      --radius-lg:  12px;
    }

    /* System dark mode (when no manual preference saved) */
    @media (prefers-color-scheme: dark) {
      :root:not(.light) {
        --bg:         #141413;
        --surface:    #1e1e1c;
        --surface-2:  #252523;
        --border:     #2e2e2b;
        --border-strong: #3a3a36;
        --text:       #f0f0ec;
        --text-2:     #a0a09a;
        --text-3:     #606060;
        --green:      #4ade80;
        --green-bg:   #14532d;
        --red:        #f87171;
        --red-bg:     #7f1d1d;
        --blue:       #60a5fa;
        --blue-bg:    #1e3a5f;
        --purple:     #a78bfa;
        --purple-bg:  #3b1f6e;
      }
    }

    /* Explicit dark mode class */
    :root.dark {
      --bg:         #141413;
      --surface:    #1e1e1c;
      --surface-2:  #252523;
      --border:     #2e2e2b;
      --border-strong: #3a3a36;
      --text:       #f0f0ec;
      --text-2:     #a0a09a;
      --text-3:     #606060;
      --green:      #4ade80;
      --green-bg:   #14532d;
      --red:        #f87171;
      --red-bg:     #7f1d1d;
      --blue:       #60a5fa;
      --blue-bg:    #1e3a5f;
      --purple:     #a78bfa;
      --purple-bg:  #3b1f6e;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 15px;
      line-height: 1.5;
      height: 100dvh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── App shell: fixed full-height flex column ── */
    .app-shell {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-width: 720px;
      margin: 0 auto;
      width: 100%;
      overflow: hidden;
    }

    /* ── Top chrome: shrinks to fit, never scrolls ── */
    .app-chrome { flex-shrink: 0; padding: 8px 12px 0; }

    /* ── Scrollable content area ── */
    .app-content { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 0 12px 12px; -webkit-overflow-scrolling: touch; }
    .app-content::-webkit-scrollbar { display: none; }
    .app-content { scrollbar-width: none; }

    /* ── Header ── */
    .app-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; gap: 8px; }
    .app-header h1 { font-size: 17px; font-weight: 600; letter-spacing: -.3px; }
    .app-header p  { font-size: 10px; color: var(--text-3); margin-top: 1px; }
    .header-actions { display: flex; align-items: center; gap: 5px; flex-shrink: 0; }
    .sync-pill { display: flex; align-items: center; gap: 5px; background: var(--surface); border: 1px solid var(--border); border-radius: 99px; padding: 4px 8px; font-size: 11px; color: var(--text-2); white-space: nowrap; }
    .sync-dot { width: 6px; height: 6px; border-radius: 50%; background: #22c55e; flex-shrink: 0; }
    .sync-dot.offline { background: var(--text-3); }
    @media (max-width: 380px) { .sync-pill span { display: none; } }

    /* ── Account balance card ── */
    .acct-balance-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 8px 10px; margin-bottom: 6px; display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .acct-balance-card .left .lbl { font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: var(--text-3); margin-bottom: 1px; }
    .acct-balance-card .left .val { font-size: 19px; font-weight: 600; letter-spacing: -.4px; line-height: 1.2; }
    .acct-balance-card .left .sub { font-size: 10px; color: var(--text-3); margin-top: 1px; }
    .acct-balance-card .right { display: flex; flex-direction: column; gap: 3px; align-items: flex-end; flex-shrink: 0; }
    .set-balance-btn { background: none; border: 1px solid var(--border-strong); border-radius: var(--radius); padding: 5px 9px; font-size: 11px; font-family: inherit; cursor: pointer; color: var(--text-2); font-weight: 500; white-space: nowrap; min-height: 34px; }
    .projected-chip { font-size: 10px; color: var(--text-3); text-align: right; }
    .projected-chip .pos { font-weight: 600; color: var(--green); }
    .projected-chip .neg { font-weight: 600; color: var(--red); }

    /* ── Summary cards ── */
    .summary-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin-bottom: 6px; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 7px 9px; }
    .stat-card .label { font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; color: var(--text-3); margin-bottom: 2px; }
    .stat-card .value { font-size: 14px; font-weight: 600; letter-spacing: -.3px; }
    .stat-card.income .value { color: var(--green); }
    .stat-card.expense .value { color: var(--red); }
    .stat-card.balance .value { color: var(--blue); }

    /* ── Tabs ── */
    .tab-bar { display: flex; gap: 2px; background: var(--surface-2); border-radius: var(--radius); padding: 2px; margin-bottom: 4px; }
    .tab { flex: 1; padding: 5px 4px; background: none; border: none; border-radius: 5px; font-size: 11px; font-family: inherit; cursor: pointer; color: var(--text-2); font-weight: 500; min-height: 34px; }
    .tab.active { background: var(--surface); color: var(--text); box-shadow: 0 1px 3px rgba(0,0,0,.08); }
    .tab svg { vertical-align: -3px; margin-right: 2px; }

    /* ── Month nav ── */
    .month-bar { display: flex; align-items: center; justify-content: space-between; padding: 2px 0 4px; }
    .month-bar h2 { font-size: 14px; font-weight: 600; }
    .nav-btns { display: flex; gap: 5px; }
    .nav-btn { width: 34px; height: 34px; border: 1px solid var(--border-strong); background: var(--surface); border-radius: var(--radius); cursor: pointer; font-size: 18px; color: var(--text-2); display: flex; align-items: center; justify-content: center; }

    /* ── Zoom controls ── */
    .zoom-bar { display: flex; gap: 2px; background: var(--surface-2); border-radius: var(--radius); padding: 2px; margin-bottom: 6px; }
    .zoom-btn { flex: 1; padding: 4px 2px; background: none; border: none; border-radius: 5px; font-size: 10px; font-family: inherit; cursor: pointer; color: var(--text-3); font-weight: 500; white-space: nowrap; min-height: 30px; }
    .zoom-btn.active { background: var(--surface); color: var(--text); box-shadow: 0 1px 3px rgba(0,0,0,.08); }

    /* ── Calendar ── */
    .calendar { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 6px; }
    .cal-header { display: grid; grid-template-columns: repeat(7, 1fr); border-bottom: 1px solid var(--border); }
    .cal-dname { padding: 4px 2px; text-align: center; font-size: 9px; font-weight: 600; color: var(--text-3); text-transform: uppercase; letter-spacing: .04em; }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
    .cal-cell { padding: 3px 3px 2px; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); cursor: pointer; position: relative; min-height: 46px; }
    .cal-cell:nth-child(7n) { border-right: none; }
    .cal-cell.faded .cal-num { opacity: .25; }
    .cal-cell.today { background: var(--blue-bg); }
    .cal-cell.today .cal-num { color: var(--blue); font-weight: 700; }
    .cal-cell.selected { outline: 2px solid var(--blue); outline-offset: -2px; background: var(--blue-bg); }
    .cal-num { font-size: 11px; color: var(--text-2); margin-bottom: 2px; font-weight: 500; }
    .cal-pills { display: flex; flex-direction: column; gap: 1px; }
    .cal-pill { font-size: 8px; border-radius: 2px; padding: 1px 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.3; }
    .cal-pill.income  { background: var(--green-bg); color: var(--green); }
    .cal-pill.expense { background: var(--red-bg);   color: var(--red);   }
    .cal-pill.more    { color: var(--text-3); font-size: 8px; }
    @media (max-width: 400px) {
      .cal-pill { display: none; }
      .cal-cell.has-income::before  { content:''; position:absolute; bottom:3px; left:25%; width:5px; height:5px; border-radius:50%; background:var(--green); }
      .cal-cell.has-expense::after  { content:''; position:absolute; bottom:3px; right:25%; width:5px; height:5px; border-radius:50%; background:var(--red); }
    }

    /* ── Section panel ── */
    .panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 6px; overflow: hidden; }
    .panel-header { display: flex; align-items: center; justify-content: space-between; padding: 8px 10px; border-bottom: 1px solid var(--border); }
    .panel-header h3 { font-size: 12px; font-weight: 600; }
    .add-btn { display: flex; align-items: center; gap: 4px; background: none; border: 1px solid var(--border-strong); border-radius: var(--radius); padding: 5px 10px; font-size: 11px; font-family: inherit; cursor: pointer; color: var(--text-2); font-weight: 500; min-height: 34px; }

    /* ── Entry rows ── */
    .entry-row { display: flex; align-items: center; gap: 7px; padding: 8px 10px; }
    .entry-icon { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 12px; }
    .entry-icon.income  { background: var(--green-bg); }
    .entry-icon.expense { background: var(--red-bg); }
    .entry-info { flex: 1; min-width: 0; }
    .entry-name { font-size: 12px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .entry-meta { font-size: 10px; color: var(--text-3); margin-top: 1px; }
    .recur-tag { font-size: 9px; background: var(--purple-bg); color: var(--purple); border-radius: 3px; padding: 1px 4px; margin-left: 3px; vertical-align: middle; font-weight: 500; }
    .entry-amount { font-size: 12px; font-weight: 600; flex-shrink: 0; }
    .entry-amount.income  { color: var(--green); }
    .entry-amount.expense { color: var(--red); }

    /* Action buttons — always visible on touch, hover on desktop */
    .recur-actions { display: flex; gap: 1px; flex-shrink: 0; }
    .del-btn, .edit-btn { background: none; border: none; cursor: pointer; padding: 4px; border-radius: var(--radius); font-size: 12px; line-height: 1; min-width: 30px; min-height: 30px; display: flex; align-items: center; justify-content: center; color: var(--text-3); }
    @media (hover: hover) {
      .del-btn, .edit-btn { opacity: 0; transition: opacity .1s; }
      .entry-row:hover .del-btn, .entry-row:hover .edit-btn,
      .recur-row:hover .del-btn, .recur-row:hover .edit-btn { opacity: 1; }
    }
    .del-btn:hover  { color: var(--red);  background: var(--red-bg); }
    .edit-btn:hover { color: var(--blue); background: var(--blue-bg); }

    .date-divider { padding: 5px 10px 2px; font-size: 9px; font-weight: 600; color: var(--text-3); text-transform: uppercase; letter-spacing: .05em; border-top: 1px solid var(--border); margin-top: 2px; }
    .date-divider:first-child { border-top: none; margin-top: 0; }
    .empty-state { padding: 20px 12px; text-align: center; color: var(--text-3); font-size: 12px; }
    .empty-state .icon { font-size: 22px; margin-bottom: 5px; }

    /* ── Recurring rows ── */
    .recur-row { display: flex; align-items: center; gap: 8px; padding: 9px 10px; border-bottom: 1px solid var(--border); }
    .recur-row:last-child { border-bottom: none; }
    .recur-freq { font-size: 10px; color: var(--text-3); margin-top: 1px; }

    /* ── Day balance banner ── */
    .day-balance-banner { display: flex; align-items: center; justify-content: space-between; padding: 7px 10px; border-bottom: 1px solid var(--border); background: var(--surface-2); gap: 8px; }
    .day-balance-banner .dbb-label { font-size: 10px; color: var(--text-3); font-weight: 500; }
    .day-balance-banner .dbb-value { font-size: 16px; font-weight: 600; letter-spacing: -.3px; }
    .day-balance-banner .dbb-note  { font-size: 9px; color: var(--text-3); margin-top: 1px; }

    /* ── Day total footer ── */
    .day-total-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 10px; border-top: 1px solid var(--border); background: var(--surface-2); gap: 6px; }
    .day-total-row .dt-label { font-size: 10px; color: var(--text-3); font-weight: 500; }
    .day-total-row .dt-values { display: flex; gap: 7px; font-size: 10px; font-weight: 600; }
    .day-total-row .dt-income  { color: var(--green); }
    .day-total-row .dt-expense { color: var(--red); }
    .day-total-row .dt-net     { color: var(--text-2); padding-left: 7px; border-left: 1px solid var(--border); }

    /* ── Modal — sheet on mobile, centered on desktop ── */
    .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,.5); display: flex; align-items: flex-end; justify-content: center; z-index: 200; }
    @media (min-width: 560px) { .modal-backdrop { align-items: center; padding: 1rem; } }
    .modal { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg) var(--radius-lg) 0 0; padding: 1.1rem 1rem 1.5rem; width: 100%; max-width: 480px; max-height: 90dvh; overflow-y: auto; }
    @media (min-width: 560px) { .modal { border-radius: var(--radius-lg); } }
    .modal h2 { font-size: 15px; font-weight: 600; margin-bottom: .9rem; }
    .form-group { margin-bottom: 10px; }
    .form-group label { display: block; font-size: 11px; font-weight: 500; color: var(--text-2); margin-bottom: 4px; }
    .form-group input,
    .form-group select { width: 100%; padding: 10px 11px; border: 1px solid var(--border-strong); border-radius: var(--radius); background: var(--surface); color: var(--text); font-size: 16px; font-family: inherit; outline: none; }
    .form-group input:focus, .form-group select:focus { border-color: var(--blue); box-shadow: 0 0 0 3px var(--blue-bg); }
    .type-toggle { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .type-btn { padding: 10px; border: 1px solid var(--border-strong); border-radius: var(--radius); background: none; cursor: pointer; font-size: 13px; font-family: inherit; color: var(--text-2); font-weight: 500; min-height: 44px; }
    .type-btn.active.expense { background: var(--red-bg); border-color: var(--red); color: var(--red); }
    .type-btn.active.income  { background: var(--green-bg); border-color: var(--green); color: var(--green); }
    .modal-actions { display: flex; gap: 8px; margin-top: .9rem; }
    .modal-actions button { flex: 1; padding: 12px; border-radius: var(--radius); font-size: 14px; font-family: inherit; cursor: pointer; font-weight: 500; min-height: 44px; }
    .btn-cancel { background: none; border: 1px solid var(--border-strong); color: var(--text-2); }
    .btn-save { background: var(--blue); border: none; color: #fff; }
    .btn-save:disabled { opacity: .5; cursor: not-allowed; }
    .error-msg { font-size: 11px; color: var(--red); margin-top: 6px; }

    /* ── Setup screen ── */
    .setup-screen { max-width: 420px; margin: 0 auto; padding: 1.5rem 1rem; height: 100dvh; overflow-y: auto; }
    .setup-screen h1 { font-size: 21px; font-weight: 600; margin-bottom: .4rem; }
    .setup-screen p  { font-size: 13px; color: var(--text-2); margin-bottom: 1.25rem; line-height: 1.6; }
    .setup-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.1rem; margin-bottom: .75rem; }
    .setup-card h2 { font-size: 14px; font-weight: 600; margin-bottom: .75rem; }
    .setup-card input { width: 100%; padding: 10px 11px; border: 1px solid var(--border-strong); border-radius: var(--radius); background: var(--surface); color: var(--text); font-size: 16px; font-family: inherit; margin-bottom: 8px; outline: none; }
    .setup-card input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px var(--blue-bg); }
    .setup-card button { width: 100%; padding: 12px; background: var(--blue); border: none; border-radius: var(--radius); color: #fff; font-size: 14px; font-family: inherit; font-weight: 600; cursor: pointer; margin-top: 4px; min-height: 44px; }
    .step-label { display: inline-block; background: var(--blue-bg); color: var(--blue); font-size: 11px; font-weight: 600; border-radius: 99px; padding: 2px 9px; margin-bottom: 8px; }
    .config-link { font-size: 12px; color: var(--text-3); text-align: center; margin-top: .75rem; }
    .config-link a { color: var(--blue); text-decoration: none; }
    .note-box { background: var(--blue-bg); border: 1px solid var(--blue); border-radius: var(--radius); padding: 10px 13px; font-size: 12px; color: var(--blue); margin-bottom: 1rem; line-height: 1.5; }

    /* ── Loading ── */
    .spinner { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100dvh; gap: 12px; color: var(--text-3); font-size: 14px; }
    .spin { width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Year view ── */
    .year-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
    @media (max-width: 400px) { .year-grid { grid-template-columns: repeat(2, 1fr); } }
    .year-cell { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 8px 9px; cursor: pointer; min-height: 44px; }
    .year-cell.today-month { outline: 2px solid var(--blue); outline-offset: -2px; background: var(--blue-bg); }
    .year-cell .yc-name { font-size: 10px; font-weight: 600; color: var(--text-2); margin-bottom: 3px; }
    .year-cell .yc-net  { font-size: 14px; font-weight: 600; letter-spacing: -.2px; }
    .year-cell .yc-sub  { font-size: 9px; color: var(--text-3); margin-top: 1px; }
    .year-cell .yc-bar  { height: 3px; border-radius: 2px; margin-top: 5px; background: var(--border); overflow: hidden; }
    .year-cell .yc-bar-fill { height: 100%; border-radius: 2px; }

    /* ── Quarter view ── */
    .quarter-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
    @media (max-width: 480px) { .quarter-grid { grid-template-columns: 1fr; } }
    .quarter-month { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; cursor: pointer; }
    .quarter-month.today-month { outline: 2px solid var(--blue); outline-offset: -2px; }
    .qm-header { padding: 7px 9px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: baseline; }
    .qm-header .qm-name { font-size: 11px; font-weight: 600; }
    .qm-header .qm-net  { font-size: 11px; font-weight: 600; }
    .qm-entries { padding: 3px 0; }
    .qm-entry { display: flex; justify-content: space-between; padding: 2px 9px; font-size: 10px; }
    .qm-entry .qme-name { color: var(--text-2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 90px; }
    .qm-entry .qme-amt  { font-weight: 500; flex-shrink: 0; }
    .qm-more { padding: 2px 9px 5px; font-size: 9px; color: var(--text-3); }

    /* ── Week view ── */
    .week-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; margin-bottom: 6px; }
    .week-cell { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 5px 3px; cursor: pointer; min-height: 72px; }
    .week-cell.today { background: var(--blue-bg); border-color: var(--blue); }
    .week-cell.selected { outline: 2px solid var(--blue); outline-offset: -2px; }
    .wc-dow  { font-size: 8px; font-weight: 600; color: var(--text-3); text-transform: uppercase; text-align: center; margin-bottom: 1px; }
    .wc-num  { font-size: 13px; font-weight: 600; color: var(--text); text-align: center; margin-bottom: 3px; }
    .week-cell.today .wc-num { color: var(--blue); }
    .wc-bal  { font-size: 8px; font-weight: 600; text-align: center; margin-bottom: 2px; }
    .wc-pills { display: flex; flex-direction: column; gap: 1px; }
    .wc-pill { font-size: 7px; border-radius: 2px; padding: 1px 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.3; }
    .wc-pill.income  { background: var(--green-bg); color: var(--green); }
    .wc-pill.expense { background: var(--red-bg); color: var(--red); }
    @media (max-width: 400px) { .wc-pill { display: none; } .wc-bal { display: none; } }

    /* ── Day view ── */
    .day-view { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 6px; }
    .day-view-header { padding: 8px 10px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .day-view-header .dv-date { font-size: 14px; font-weight: 600; }
    .day-view-header .dv-sub  { font-size: 10px; color: var(--text-3); margin-top: 1px; }
    .day-view-bal { display: flex; align-items: center; justify-content: space-between; padding: 7px 10px; background: var(--surface-2); border-bottom: 1px solid var(--border); }
    .day-view-bal .dvb-label { font-size: 10px; color: var(--text-3); font-weight: 500; }
    .day-view-bal .dvb-value { font-size: 17px; font-weight: 600; letter-spacing: -.3px; }
    .day-timeline { }
    .day-tl-entry { display: flex; align-items: center; gap: 9px; padding: 8px 10px; border-bottom: 1px solid var(--border); }
    .day-tl-entry:last-child { border-bottom: none; }
    .day-tl-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .day-tl-dot.income  { background: var(--green); }
    .day-tl-dot.expense { background: var(--red); }
    .day-tl-info { flex: 1; min-width: 0; }
    .day-tl-name { font-size: 12px; font-weight: 500; }
    .day-tl-cat  { font-size: 10px; color: var(--text-3); margin-top: 1px; }
    .day-tl-amt  { font-size: 12px; font-weight: 600; flex-shrink: 0; }
    .day-tl-amt.income  { color: var(--green); }
    .day-tl-amt.expense { color: var(--red); }
    .day-tl-run  { font-size: 9px; color: var(--text-3); text-align: right; margin-top: 1px; }
    .day-view-empty { padding: 24px 12px; text-align: center; color: var(--text-3); font-size: 12px; }

    /* ── Theme toggle ── */
    .theme-btn { width: 34px; height: 34px; border: 1px solid var(--border-strong); background: var(--surface); border-radius: var(--radius); cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

  </style>
</head>
<body>

<div id="root"></div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, set, push, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// ─────────────────────────────────────────
//  CONFIG — paste your Firebase config here
// ─────────────────────────────────────────
const FIREBASE_CONFIG_KEY = 'familybudget_firebase_config';
const THEME_KEY = 'familybudget_theme';

// Apply saved theme immediately to avoid flash
(function() {
  const t = localStorage.getItem(THEME_KEY);
  if (t === 'dark') document.documentElement.classList.add('dark');
  else if (t === 'light') document.documentElement.classList.add('light');
})();

function loadConfig() {
  try { return JSON.parse(localStorage.getItem(FIREBASE_CONFIG_KEY)); } catch { return null; }
}
function saveConfig(cfg) {
  localStorage.setItem(FIREBASE_CONFIG_KEY, JSON.stringify(cfg));
}

function getTheme() { return localStorage.getItem(THEME_KEY) || 'system'; }
function toggleTheme() {
  const root = document.documentElement;
  if (root.classList.contains('dark')) {
    root.classList.remove('dark');
    root.classList.add('light');
    localStorage.setItem(THEME_KEY, 'light');
  } else {
    root.classList.remove('light');
    root.classList.add('dark');
    localStorage.setItem(THEME_KEY, 'dark');
  }
}

// ─── State ───────────────────────────────
let db = null;
let state = {
  entries: {},
  recurring: {},
  accountBalance: null,       // { value, updatedAt } — current balance snapshot
  monthlyBalances: {},        // { 'YYYY-MM': number } — carry-forward snapshots per month
  balanceSnapshots: {},       // { 'YYYY-MM-DD': { value, updatedAt } } — intraday snapshots
  currentYear: new Date().getFullYear(),
  currentMonth: new Date().getMonth(),
  currentWeekStart: null,
  selectedDate: null,
  view: 'calendar',
  zoom: 'month',
  synced: false,
};

// ─── Helpers ─────────────────────────────
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS   = ['Su','Mo','Tu','We','Th','Fr','Sa'];

function fmt(n) {
  return '$' + Math.abs(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
function pad(n) { return String(n).padStart(2, '0'); }
function dateStr(y, m, d) { return `${y}-${pad(m+1)}-${pad(d)}`; }
function todayStr() { const t = new Date(); return dateStr(t.getFullYear(), t.getMonth(), t.getDate()); }

// accountBalance may be a legacy plain number or { value, updatedAt }
function acctValue() {
  const a = state.accountBalance;
  if (a === null || a === undefined) return null;
  return typeof a === 'object' ? a.value : a;
}
function acctUpdatedAt() {
  const a = state.accountBalance;
  if (!a || typeof a !== 'object') return null;
  return a.updatedAt || null;
}

// ─── Recurring expansion ─────────────────
function expandRecurring(year, month) {
  const expanded = [];
  Object.values(state.recurring).forEach(r => {
    const start = new Date(r.startDate + 'T00:00:00');
    let d = new Date(start);
    const monthEnd   = new Date(year, month + 1, 0);
    const monthStart = new Date(year, month, 1);
    const endDate    = r.endDate ? new Date(r.endDate + 'T00:00:00') : null;
    const skipped    = r.skippedDates || {};
    // Collect all overrides so we can also include rescheduled instances that
    // land in this month even if their original date is in a different month
    const overridesMap = r.overrides || {};

    // Walk the schedule and collect instances
    const safety_limit = new Date(year + 2, month, 1); // don't walk past 2 years ahead
    let d2 = new Date(start);
    let safety = 0;
    while (d2 <= safety_limit && safety++ < 1000) {
      if (endDate && d2 > endDate) break;
      const ds = d2.toISOString().slice(0, 10); // original scheduled date key
      const overrides = overridesMap[ds] || {};
      const effectiveDate = overrides.date || ds; // may be rescheduled
      const effD = new Date(effectiveDate + 'T00:00:00');

      if (!skipped[ds]) {
        // Include if the *effective* date falls in the requested month
        if (effD >= monthStart && effD <= monthEnd) {
          expanded.push({
            ...r, ...overrides,
            id: r.id + '_' + ds,           // keyed by original so overrides still match
            scheduledDate: ds,              // original scheduled date (for override lookups)
            date: effectiveDate,            // displayed / used date
            isInstance: true,
            isOverridden: Object.keys(overrides).length > 0
          });
        }
      }

      const freq = r.frequency;
      if      (freq === 'weekly')      d2.setDate(d2.getDate() + 7);
      else if (freq === 'biweekly')    d2.setDate(d2.getDate() + 14);
      else if (freq === 'triweekly')   d2.setDate(d2.getDate() + 21);
      else if (freq === 'monthly')     d2.setMonth(d2.getMonth() + 1);
      else if (freq === 'bimonthly')   d2.setMonth(d2.getMonth() + 2);
      else if (freq === 'quarterly')   d2.setMonth(d2.getMonth() + 3);
      else if (freq === 'semiannual')  d2.setMonth(d2.getMonth() + 6);
      else if (freq === 'annual')      d2.setFullYear(d2.getFullYear() + 1);
      else break;

      // Early exit if we're past the month and no more rescheduled instances are possible
      if (d2 > monthEnd && Object.keys(overridesMap).every(k => {
        const ov = overridesMap[k];
        const ovDate = ov.date || k;
        return new Date(ovDate + 'T00:00:00') <= monthEnd;
      })) break;
    }
  });
  return expanded;
}

function monthEntries(year, month) {
  const manual = Object.values(state.entries).filter(e => {
    const [ey, em] = e.date.split('-').map(Number);
    return ey === year && em === month + 1;
  });
  return [...manual, ...expandRecurring(year, month)];
}

function dayEntries(dateS) {
  const [y, m] = dateS.split('-').map(Number);
  return monthEntries(y, m - 1).filter(e => e.date === dateS);
}

function calcSummary(year, month) {
  let income = 0, expenses = 0;
  monthEntries(year, month).forEach(e => {
    if (e.type === 'income') income += +e.amount;
    else expenses += +e.amount;
  });
  return { income, expenses, balance: income - expenses };
}

// Projected balance = starting balance for this month + net of all entries AFTER today
// Entries on or before today are assumed already reflected in the bank balance
function calcProjected(year, month) {
  const startBal = getMonthStartBalance(year, month);
  if (startBal === null) return null;
  const today = todayStr();
  const now = new Date();
  // Only project remaining days if we're in the same month; otherwise project full month net
  const isCurrentMonth = year === now.getFullYear() && month === now.getMonth();
  let futureNet = 0;
  monthEntries(year, month).forEach(e => {
    if (isCurrentMonth ? e.date > today : true) {
      futureNet += e.type === 'income' ? +e.amount : -e.amount;
    }
  });
  if (isCurrentMonth) return startBal + futureNet;
  // For past/future months show end-of-month projected figure
  const { balance: monthNet } = calcSummary(year, month);
  return startBal + monthNet;
}

// Daily running balance = month starting balance + net of all entries up to and including targetDate
function calcDailyBalance(targetDate) {
  const [ty, tm] = targetDate.split('-').map(Number);
  const year = ty, month = tm - 1;
  const today = todayStr();

  // Check if there's a same-day balance snapshot for this date
  const snap = state.balanceSnapshots[targetDate];
  if (snap && targetDate === today) {
    // Use snapshot value + only entries created AFTER the snapshot timestamp
    const snapTs = snap.updatedAt;
    let net = 0;
    monthEntries(year, month).forEach(e => {
      if (e.date === targetDate) {
        // Only add entries logged after the snapshot was taken
        const entryTs = e.createdAt || 0;
        if (entryTs > snapTs) {
          net += e.type === 'income' ? +e.amount : -e.amount;
        }
      } else if (e.date < targetDate) {
        // Past-day entries before today are already in the snapshot value
        // (snapshot represents balance at point of update, so skip past days too)
      }
    });
    return { value: snap.value + net, hasAcct: true, fromSnapshot: true, snapTime: new Date(snapTs).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' }) };
  }

  // Fall back to month-start anchor + cumulative net
  const startBal = getMonthStartBalance(year, month);
  if (startBal !== null) {
    let net = 0;
    monthEntries(year, month).forEach(e => {
      if (e.date <= targetDate) {
        net += e.type === 'income' ? +e.amount : -e.amount;
      }
    });
    return { value: startBal + net, hasAcct: true, fromSnapshot: false };
  } else {
    let net = 0;
    monthEntries(year, month).forEach(e => {
      if (e.date <= targetDate) net += e.type === 'income' ? +e.amount : -e.amount;
    });
    return { value: net, hasAcct: false, fromSnapshot: false };
  }
}

function initFirebase(config) {
  const app = initializeApp(config);
  db = getDatabase(app);

  onValue(ref(db, 'entries'), snap => {
    state.entries = snap.val() || {};
    state.synced = true;
    render();
  });
  onValue(ref(db, 'recurring'), snap => {
    state.recurring = snap.val() || {};
    render();
  });
  onValue(ref(db, 'accountBalance'), snap => {
    state.accountBalance = snap.val(); // { value, updatedAt } or legacy number
    render();
  });
  onValue(ref(db, 'monthlyBalances'), snap => {
    state.monthlyBalances = snap.val() || {};
    render();
  });
  onValue(ref(db, 'balanceSnapshots'), snap => {
    state.balanceSnapshots = snap.val() || {};
    render();
  });
}

// ─── Carry-forward helpers ────────────────

// Key format: 'YYYY-MM'
function monthKey(year, month) {
  return `${year}-${String(month + 1).padStart(2, '0')}`;
}

// Get the starting balance for a given month.
// Priority: explicit monthlyBalances snapshot → carry-forward from previous month → accountBalance if it's the current month → null
function getMonthStartBalance(year, month) {
  const key = monthKey(year, month);
  if (state.monthlyBalances[key] !== undefined) return state.monthlyBalances[key];

  // Walk backward up to 24 months to find a saved anchor
  for (let i = 1; i <= 24; i++) {
    let y = year, m = month - i;
    while (m < 0) { m += 12; y--; }
    const k = monthKey(y, m);
    if (state.monthlyBalances[k] !== undefined) {
      // Found an anchor — chain forward month by month
      let bal = state.monthlyBalances[k];
      for (let j = i - 1; j >= 0; j--) {
        let cy = year, cm = month - j;
        while (cm < 0) { cm += 12; cy--; }
        const { balance } = calcSummary(cy, cm);
        bal += balance;
      }
      return bal;
    }
  }

  // No saved anchor — use accountBalance for current month only
  const now = new Date();
  if (year === now.getFullYear() && month === now.getMonth()) {
    return acctValue(); // may be null
  }
  return null;
}

// Save the end-of-month balance as the starting balance for next month.
// Called when navigating away from a month or explicitly triggered.
async function saveCarryForward(year, month) {
  const startBal = getMonthStartBalance(year, month);
  if (startBal === null) return;
  const { balance: monthNet } = calcSummary(year, month);
  const endBal = startBal + monthNet;
  // Store as the start of NEXT month
  let ny = year, nm = month + 1;
  if (nm > 11) { nm = 0; ny++; }
  const key = monthKey(ny, nm);
  await set(ref(db, 'monthlyBalances/' + key), endBal);
}

// ─── Render ──────────────────────────────
function render() {
  const root = document.getElementById('root');
  if (!loadConfig()) { root.innerHTML = renderSetup(); attachSetup(); return; }
  if (!state.synced)  { root.innerHTML = `<div class="spinner"><div class="spin"></div>Connecting to your budget…</div>`; return; }
  root.innerHTML = renderApp();
  attachApp();
}

function renderSetup() {
  return `
  <div class="setup-screen">
    <h1>Family Budget</h1>
    <p>Connect your Firebase database to get started. Both you and your partner will share the same data in real time.</p>
    <div class="note-box">📋 See the <strong>SETUP.md</strong> file included in this project for step-by-step Firebase instructions.</div>
    <div class="setup-card">
      <span class="step-label">Firebase config</span>
      <h2>Paste your Firebase config</h2>
      <input id="cfg-apiKey"            placeholder="apiKey" />
      <input id="cfg-authDomain"        placeholder="authDomain" />
      <input id="cfg-databaseURL"       placeholder="databaseURL  ← required" />
      <input id="cfg-projectId"         placeholder="projectId" />
      <input id="cfg-storageBucket"     placeholder="storageBucket" />
      <input id="cfg-messagingSenderId" placeholder="messagingSenderId" />
      <input id="cfg-appId"             placeholder="appId" />
      <div id="cfg-error" class="error-msg" style="display:none"></div>
      <button id="cfg-save-btn">Connect and open budget →</button>
    </div>
    <p class="config-link">Need help? Open <strong>SETUP.md</strong> in this project for a step-by-step walkthrough.</p>
  </div>`;
}

function attachSetup() {
  document.getElementById('cfg-save-btn').addEventListener('click', () => {
    const get = id => document.getElementById(id).value.trim();
    const cfg = {
      apiKey:            get('cfg-apiKey'),
      authDomain:        get('cfg-authDomain'),
      databaseURL:       get('cfg-databaseURL'),
      projectId:         get('cfg-projectId'),
      storageBucket:     get('cfg-storageBucket'),
      messagingSenderId: get('cfg-messagingSenderId'),
      appId:             get('cfg-appId'),
    };
    if (!cfg.databaseURL) {
      const err = document.getElementById('cfg-error');
      err.textContent = 'databaseURL is required — it looks like https://your-project-default-rtdb.firebaseio.com';
      err.style.display = 'block';
      return;
    }
    saveConfig(cfg);
    initFirebase(cfg);
    render();
  });
}

function renderApp() {
  const { currentYear: y, currentMonth: m, view, zoom } = state;
  const { income, expenses, balance } = calcSummary(y, m);
  const isDark = document.documentElement.classList.contains('dark') ||
    (!document.documentElement.classList.contains('light') && window.matchMedia('(prefers-color-scheme: dark)').matches);

  // Account balance card
  const acctVal = acctValue();
  const acctUpdated = acctUpdatedAt();
  const now = new Date();
  const todayDateStr = todayStr();
  // Live running balance = today's fully calculated balance including all entries
  const { value: liveRunning, hasAcct: hasLiveBal } = calcDailyBalance(todayDateStr);
  const liveDisplay = hasLiveBal ? liveRunning : acctVal;
  const isCurrentMonth = y === now.getFullYear() && m === now.getMonth();
  const startBal = getMonthStartBalance(y, m);
  const projected = calcProjected(y, m);

  const prevM = m === 0 ? 11 : m - 1;
  const prevY = m === 0 ? y - 1 : y;
  const carryLabel = startBal !== null
    ? (isCurrentMonth
        ? `Carried in from ${MONTHS[prevM]}: ${startBal >= 0 ? '+' : ''}${fmt(startBal)}`
        : `Starting balance: ${startBal >= 0 ? '+' : ''}${fmt(startBal)}`)
    : null;

  const acctSubLabel = isCurrentMonth
    ? (liveDisplay !== null
        ? (acctUpdated
            ? `Last set ${new Date(acctUpdated).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' })}` + (carryLabel ? ` · ${carryLabel}` : '')
            : (carryLabel || 'Running balance'))
        : 'Tap "Update" to set your current balance')
    : (carryLabel || 'No starting balance on record');

  const acctCard = `
  <div class="acct-balance-card">
    <div class="left">
      <div class="lbl">${isCurrentMonth ? 'Balance now' : `${MONTHS[m]} ${y} overview`}</div>
      <div class="val" style="color:${liveDisplay!==null?(liveDisplay>=0?'var(--text)':'var(--red)'):'var(--text-3)'}">${isCurrentMonth ? (liveDisplay !== null ? (liveDisplay < 0 ? '-' : '') + fmt(liveDisplay) : '—') : (startBal !== null ? fmt(startBal) : '—')}</div>
      <div class="sub">${acctSubLabel}</div>
    </div>
    <div class="right">
      ${isCurrentMonth ? `<button class="set-balance-btn" data-action="set-balance">✎ Update</button>` : ''}
      ${projected !== null ? `<div class="projected-chip">End of month: <span class="${projected >= 0 ? 'pos' : 'neg'}">${projected < 0 ? '-' : ''}${fmt(projected)}</span></div>` : ''}
    </div>
  </div>`;

  // Nav label and prev/next targets depend on zoom
  const navLabel = zoomNavLabel(y, m);

  // Summary cards: suppress for year view (each month cell is its own summary)
  const showSummary = zoom !== 'year';
  const summaryCards = showSummary ? `
    <div class="summary-row">
      <div class="stat-card income"><div class="label">Income</div><div class="value">${fmt(income)}</div></div>
      <div class="stat-card expense"><div class="label">Expenses</div><div class="value">${fmt(expenses)}</div></div>
      <div class="stat-card balance"><div class="label">Net this month</div><div class="value" style="color:${balance >= 0 ? 'var(--green)' : 'var(--red)'}">${balance < 0 ? '-' : ''}${fmt(balance)}</div></div>
    </div>` : '';

  // Zoom bar (only in calendar view)
  const zoomBar = view === 'calendar' ? `
    <div class="zoom-bar">
      <button class="zoom-btn ${zoom==='year'    ?'active':''}" data-zoom="year">Year</button>
      <button class="zoom-btn ${zoom==='quarter' ?'active':''}" data-zoom="quarter">Quarter</button>
      <button class="zoom-btn ${zoom==='month'   ?'active':''}" data-zoom="month">Month</button>
      <button class="zoom-btn ${zoom==='week'    ?'active':''}" data-zoom="week">Week</button>
      <button class="zoom-btn ${zoom==='day'     ?'active':''}" data-zoom="day">Day</button>
    </div>` : '';

  let calContent = '';
  if (view === 'calendar') {
    if      (zoom === 'year')    calContent = renderYearView(y);
    else if (zoom === 'quarter') calContent = renderQuarterView(y, m);
    else if (zoom === 'month')   calContent = renderCalendar(y, m);
    else if (zoom === 'week')    calContent = renderWeekView();
    else if (zoom === 'day')     calContent = renderDayView(state.selectedDate || todayStr());
  }

  return `
  <div class="app-shell">
    <div class="app-chrome">
      <div class="app-header">
        <div>
          <h1>Family budget</h1>
          <p>${MONTHS[m]} ${y}</p>
        </div>
        <div class="header-actions">
          <div class="sync-pill">
            <div class="sync-dot ${state.synced ? '' : 'offline'}"></div>
            <span>${state.synced ? 'Live' : '…'}</span>
          </div>
          <button class="theme-btn" id="theme-btn" title="Toggle dark/light mode">${isDark ? '☀️' : '🌙'}</button>
          <button class="nav-btn" id="disconnect-btn" title="Disconnect / change database" style="font-size:11px;width:auto;padding:0 8px;color:var(--text-3);height:34px;">⚙</button>
        </div>
      </div>

      ${acctCard}

      ${summaryCards}

      <div class="tab-bar">
        <button class="tab ${view==='calendar'?'active':''}" data-view="calendar">
          <svg width="11" height="11" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="1" y="3" width="14" height="12" rx="2"/><path d="M1 7h14M5 1v4M11 1v4"/></svg>Calendar
        </button>
        <button class="tab ${view==='list'?'active':''}" data-view="list">
          <svg width="11" height="11" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M2 4h12M2 8h12M2 12h7"/></svg>Entries
        </button>
        <button class="tab ${view==='recurring'?'active':''}" data-view="recurring">
          <svg width="11" height="11" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M2 8a6 6 0 1 0 6-6"/><path d="M8 1l-2 2 2 2"/></svg>Recurring
        </button>
      </div>

      ${zoomBar}

      <div class="month-bar">
        <h2>${navLabel}</h2>
        <div class="nav-btns">
          <button class="nav-btn" id="prev-btn">&#8249;</button>
          <button class="nav-btn" id="next-btn">&#8250;</button>
        </div>
      </div>
    </div>

    <div class="app-content">
      ${ view==='calendar' ? calContent : view==='list' ? renderList(y, m) : renderRecurring() }
    </div>
  </div>

  <div id="modal-root"></div>`;
}

// ─── Zoom helpers ─────────────────────────

function zoomNavLabel(y, m) {
  const { zoom } = state;
  if (zoom === 'year') return `${y}`;
  if (zoom === 'quarter') {
    const q = Math.floor(m / 3) + 1;
    return `Q${q} ${y}`;
  }
  if (zoom === 'week') {
    const ws = getWeekStart();
    const we = new Date(ws); we.setDate(we.getDate() + 6);
    const fmt1 = ws.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    const fmt2 = we.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    return `${fmt1} – ${fmt2}`;
  }
  if (zoom === 'day') {
    const d = state.selectedDate || todayStr();
    return new Date(d + 'T00:00:00').toLocaleDateString('en-US', { weekday: 'short', month: 'long', day: 'numeric', year: 'numeric' });
  }
  return `${MONTHS[m]} ${y}`;
}

function getWeekStart() {
  if (state.currentWeekStart) return new Date(state.currentWeekStart + 'T00:00:00');
  // Default: Sunday of the week containing selectedDate or today
  const anchor = state.selectedDate ? new Date(state.selectedDate + 'T00:00:00') : new Date();
  const d = new Date(anchor);
  d.setDate(d.getDate() - d.getDay());
  return d;
}

function navigateZoom(dir) {
  const { zoom } = state;
  if (zoom === 'year') {
    state.currentYear += dir;
  } else if (zoom === 'quarter') {
    state.currentMonth += dir * 3;
    while (state.currentMonth < 0)  { state.currentMonth += 12; state.currentYear--; }
    while (state.currentMonth > 11) { state.currentMonth -= 12; state.currentYear++; }
  } else if (zoom === 'month') {
    state.currentMonth += dir;
    if (state.currentMonth < 0)  { state.currentMonth = 11; state.currentYear--; }
    if (state.currentMonth > 11) { state.currentMonth = 0;  state.currentYear++; }
  } else if (zoom === 'week') {
    const ws = getWeekStart();
    ws.setDate(ws.getDate() + dir * 7);
    state.currentWeekStart = ws.toISOString().slice(0, 10);
    state.currentYear  = ws.getFullYear();
    state.currentMonth = ws.getMonth();
  } else if (zoom === 'day') {
    const d = new Date((state.selectedDate || todayStr()) + 'T00:00:00');
    d.setDate(d.getDate() + dir);
    state.selectedDate = d.toISOString().slice(0, 10);
    state.currentYear  = d.getFullYear();
    state.currentMonth = d.getMonth();
  }
}

// ─── Year view ────────────────────────────
function renderYearView(y) {
  const today = new Date();
  let allNet = 0;
  const months = MONTHS.map((name, mi) => {
    const { income, expenses, balance } = calcSummary(y, mi);
    allNet += balance;
    return { name, mi, income, expenses, balance };
  });
  const maxAbs = Math.max(...months.map(m => Math.abs(m.balance)), 1);

  let cells = months.map(({ name, mi, income, expenses, balance }) => {
    const isNow = y === today.getFullYear() && mi === today.getMonth();
    const barPct = Math.round((Math.abs(balance) / maxAbs) * 100);
    const barColor = balance >= 0 ? 'var(--green)' : 'var(--red)';
    const hasData = income > 0 || expenses > 0;
    return `<div class="year-cell ${isNow ? 'today-month' : ''}" data-zoom-nav="month" data-zm-month="${mi}" data-zm-year="${y}">
      <div class="yc-name">${name}</div>
      ${hasData
        ? `<div class="yc-net" style="color:${balance>=0?'var(--green)':'var(--red)'}">${balance<0?'-':''}${fmt(balance)}</div>
           <div class="yc-sub">↑${fmt(income)} ↓${fmt(expenses)}</div>
           <div class="yc-bar"><div class="yc-bar-fill" style="width:${barPct}%;background:${barColor}"></div></div>`
        : `<div class="yc-sub" style="margin-top:4px">No entries</div>`
      }
    </div>`;
  }).join('');

  const yearNet = allNet;
  return `
  <div style="margin-bottom:.75rem;display:flex;justify-content:space-between;align-items:baseline">
    <span style="font-size:13px;color:var(--text-3)">Click a month to zoom in</span>
    <span style="font-size:14px;font-weight:600;color:${yearNet>=0?'var(--green)':'var(--red)'}">Year net: ${yearNet<0?'-':''}${fmt(yearNet)}</span>
  </div>
  <div class="year-grid">${cells}</div>`;
}

// ─── Quarter view ─────────────────────────
function renderQuarterView(y, m) {
  const q = Math.floor(m / 3);
  const months = [q*3, q*3+1, q*3+2];
  const today = new Date();

  let cols = months.map(mi => {
    const { income, expenses, balance } = calcSummary(y, mi);
    const isNow = y === today.getFullYear() && mi === today.getMonth();
    const ents = monthEntries(y, mi).sort((a,b) => a.date > b.date ? 1 : -1).slice(0, 5);
    const entryRows = ents.map(e =>
      `<div class="qm-entry">
        <span class="qme-name">${e.name}</span>
        <span class="qme-amt" style="color:${e.type==='income'?'var(--green)':'var(--red)'}">${e.type==='income'?'+':'-'}${fmt(+e.amount)}</span>
      </div>`
    ).join('');
    const total = monthEntries(y, mi).length;
    const more  = total > 5 ? `<div class="qm-more">+${total-5} more</div>` : '';
    return `<div class="quarter-month ${isNow?'today-month':''}" data-zoom-nav="month" data-zm-month="${mi}" data-zm-year="${y}">
      <div class="qm-header">
        <span class="qm-name">${MONTHS[mi]}</span>
        <span class="qm-net" style="color:${balance>=0?'var(--green)':'var(--red)'}">${balance<0?'-':''}${fmt(balance)}</span>
      </div>
      <div class="qm-entries">${entryRows || '<div class="qm-more">No entries</div>'}${more}</div>
    </div>`;
  }).join('');

  return `
  <div style="margin-bottom:.75rem;font-size:13px;color:var(--text-3)">Click a month to zoom in</div>
  <div class="quarter-grid">${cols}</div>`;
}

// ─── Week view ────────────────────────────
function renderWeekView() {
  const ws = getWeekStart();
  const today = todayStr();
  const days = Array.from({ length: 7 }, (_, i) => {
    const d = new Date(ws); d.setDate(d.getDate() + i);
    return d;
  });

  // Collect all entries for the week across potentially 2 months
  const months = [...new Set(days.map(d => monthKey(d.getFullYear(), d.getMonth())))];
  const allEnts = [];
  months.forEach(k => {
    const [ky, km] = k.split('-').map(Number);
    allEnts.push(...monthEntries(ky, km - 1));
  });
  const byDay = {};
  allEnts.forEach(e => { (byDay[e.date] = byDay[e.date] || []).push(e); });

  const cells = days.map(d => {
    const ds = d.toISOString().slice(0, 10);
    const isToday = ds === today;
    const isSel   = ds === state.selectedDate;
    const ents    = byDay[ds] || [];
    const { value: bal, hasAcct } = calcDailyBalance(ds);
    const balColor = bal >= 0 ? 'var(--green)' : 'var(--red)';
    const pills = ents.slice(0, 3).map(e => {
      const label = e.name.length > 8 ? e.name.slice(0,8)+'…' : e.name;
      return `<div class="wc-pill ${e.type}">${e.type==='income'?'+':'-'} ${label}</div>`;
    }).join('');
    const more = ents.length > 3 ? `<div class="wc-pill" style="color:var(--text-3);font-size:9px">+${ents.length-3}</div>` : '';
    const balStr = hasAcct ? `<div class="wc-bal" style="color:${balColor}">${bal<0?'-':''}${fmt(bal)}</div>` : '';

    return `<div class="week-cell ${isToday?'today':''} ${isSel?'selected':''}" data-date="${ds}" data-zoom-day="${ds}">
      <div class="wc-dow">${['Su','Mo','Tu','We','Th','Fr','Sa'][d.getDay()]}</div>
      <div class="wc-num">${d.getDate()}</div>
      ${balStr}
      <div class="wc-pills">${pills}${more}</div>
    </div>`;
  }).join('');

  // Detail panel for selected day (reuses existing)
  let detail = '';
  if (state.selectedDate) {
    const selD = new Date(state.selectedDate + 'T00:00:00');
    const inWeek = days.some(d => d.toISOString().slice(0,10) === state.selectedDate);
    if (inWeek) {
      detail = renderDayDetail(state.selectedDate);
    }
  }

  return `<div class="week-grid">${cells}</div>${detail}`;
}

// ─── Day view ─────────────────────────────
function renderDayView(ds) {
  const d = new Date(ds + 'T00:00:00');
  const label = d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
  const ents  = dayEntries(ds);
  const today = todayStr();
  const { value: endBal, hasAcct, fromSnapshot, snapTime } = calcDailyBalance(ds);
  const { value: startBal } = calcDailyBalance(
    (() => { const prev = new Date(d); prev.setDate(prev.getDate()-1); return prev.toISOString().slice(0,10); })()
  );

  let running = hasAcct ? startBal : 0;
  const timeline = ents.length === 0
    ? `<div class="day-view-empty">📋 No entries. Add income or an expense.</div>`
    : ents.map(e => {
        const delta = e.type === 'income' ? +e.amount : -e.amount;
        running += delta;
        const recurTag = (e.isRecurring || e.isInstance)
          ? `<span class="recur-tag">recurring</span>` : '';
        const baseId = e.isInstance ? e.id.replace(/_\d{4}-\d{2}-\d{2}$/, '') : null;
        const schedDate = e.scheduledDate || e.date;
        const delBtn = e.isInstance
          ? `<button class="del-btn" data-action="del-instance" data-base-id="${baseId}" data-date="${schedDate}" style="opacity:.6">✕</button>`
          : `<button class="del-btn" data-action="del-entry" data-id="${e.id}" style="opacity:.6">✕</button>`;
        return `<div class="day-tl-entry">
          <div class="day-tl-dot ${e.type}"></div>
          <div class="day-tl-info">
            <div class="day-tl-name">${e.name}${recurTag}</div>
            <div class="day-tl-cat">${e.category||'Uncategorized'}${e.addedBy?' · '+e.addedBy:''}</div>
          </div>
          <div>
            <div class="day-tl-amt ${e.type}">${e.type==='income'?'+':'-'}${fmt(+e.amount)}</div>
            ${hasAcct ? `<div class="day-tl-run">${running<0?'-':''}${fmt(running)}</div>` : ''}
          </div>
          ${delBtn}
        </div>`;
      }).join('');

  const isPast   = ds <  today;
  const isToday  = ds === today;
  const balLabel = fromSnapshot
    ? `Balance (updated ${snapTime})`
    : isToday ? 'Balance today' : isPast ? 'Balance end of day' : 'Projected balance';

  return `
  <div class="day-view">
    <div class="day-view-header">
      <div>
        <div class="dv-date">${label}</div>
        <div class="dv-sub">Click ‹ › to move between days</div>
      </div>
      <button class="add-btn" data-action="add-entry" data-date="${ds}">+ Add entry</button>
    </div>
    ${hasAcct ? `<div class="day-view-bal">
      <span class="dvb-label">${balLabel}</span>
      <span class="dvb-value" style="color:${endBal>=0?'var(--green)':'var(--red)'}">${endBal<0?'-':''}${fmt(endBal)}</span>
    </div>` : ''}
    <div class="day-timeline">${timeline}</div>
  </div>`;
}

// ─── Day detail panel (shared by month + week click) ──
function renderDayDetail(ds) {
  const ents = dayEntries(ds);
  const label = new Date(ds + 'T00:00:00').toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' });
  let rows = ents.length === 0
    ? `<div class="empty-state"><div class="icon">📋</div>No entries. Add income or an expense.</div>`
    : ents.map(entryRow).join('');

  let dayInc = 0, dayExp = 0;
  ents.forEach(e => { if (e.type==='income') dayInc += +e.amount; else dayExp += +e.amount; });
  const dayNet = dayInc - dayExp;
  const totalFooter = ents.length > 0 ? `
  <div class="day-total-row">
    <span class="dt-label">Day total</span>
    <span class="dt-values">
      <span class="dt-income">+${fmt(dayInc)}</span>
      <span class="dt-expense">-${fmt(dayExp)}</span>
      <span class="dt-net" style="color:${dayNet>=0?'var(--green)':'var(--red)'}">${dayNet<0?'-':''}${fmt(dayNet)}</span>
    </span>
  </div>` : '';

  const { value: dayBal, hasAcct, fromSnapshot, snapTime } = calcDailyBalance(ds);
  const today = todayStr();
  const isPast = ds < today, isToday = ds === today;
  const noteText = hasAcct
    ? (fromSnapshot
        ? `Balance as of ${snapTime} + entries since then`
        : isPast ? 'Estimated balance at end of this day' : isToday ? "Estimated balance including today's entries" : "Projected balance after this day's entries")
    : 'Month-to-date net (set account balance for a real figure)';
  const balBanner = `
  <div class="day-balance-banner">
    <div>
      <div class="dbb-label">${isToday ? 'Balance today' : isPast ? 'Balance that day' : 'Projected balance'}</div>
      <div class="dbb-note">${noteText}</div>
    </div>
    <div class="dbb-value" style="color:${dayBal>=0?'var(--green)':'var(--red)'}">${dayBal<0?'-':''}${fmt(dayBal)}</div>
  </div>`;

  return `
  <div class="panel">
    <div class="panel-header">
      <h3>${label}</h3>
      <button class="add-btn" data-action="add-entry" data-date="${ds}">+ Add entry</button>
    </div>
    ${balBanner}
    ${rows}
    ${totalFooter}
  </div>`;
}

function renderCalendar(y, m) {
  const firstDay = new Date(y, m, 1).getDay();
  const daysInMonth = new Date(y, m + 1, 0).getDate();
  const prevDays = new Date(y, m, 0).getDate();
  const today = todayStr();

  const allEntries = monthEntries(y, m);
  const byDay = {};
  allEntries.forEach(e => { (byDay[e.date] = byDay[e.date] || []).push(e); });

  let cells = [];
  for (let i = firstDay - 1; i >= 0; i--) cells.push({ n: prevDays - i, cur: false });
  for (let i = 1; i <= daysInMonth; i++) cells.push({ n: i, cur: true });
  while ((cells.length % 7) !== 0) cells.push({ n: cells.length - daysInMonth - firstDay + 1, cur: false });

  let grid = '';
  cells.forEach(c => {
    const ds = c.cur ? dateStr(y, m, c.n) : '';
    const isToday = ds === today;
    const isSel   = ds === state.selectedDate;
    const ents    = byDay[ds] || [];
    const hasEnts = ents.length > 0;

    const hasIncome  = ents.some(e => e.type === 'income');
    const hasExpense = ents.some(e => e.type === 'expense');

    let pills = '';
    ents.slice(0, 2).forEach(e => {
      const label = e.name.length > 9 ? e.name.slice(0,9)+'…' : e.name;
      pills += `<div class="cal-pill ${e.type}">${e.type==='income'?'+':'-'} ${label}</div>`;
    });
    if (ents.length > 2) pills += `<div class="cal-pill more">+${ents.length-2}</div>`;

    grid += `<div class="cal-cell ${!c.cur?'faded':''} ${isToday?'today':''} ${isSel?'selected':''} ${hasIncome?'has-income':''} ${hasExpense?'has-expense':''}"
      ${c.cur ? `data-date="${ds}"` : ''}
      role="${c.cur?'button':''}" tabindex="${c.cur?'0':''}">
      <div class="cal-num">${c.n}</div>
      <div class="cal-pills">${pills}</div>
    </div>`;
  });

  let detail = '';
  if (state.selectedDate) {
    detail = renderDayDetail(state.selectedDate);
  }

  return `
  <div class="calendar">
    <div class="cal-header">${DAYS.map(d => `<div class="cal-dname">${d}</div>`).join('')}</div>
    <div class="cal-grid">${grid}</div>
  </div>
  ${detail}`;
}

function renderList(y, m) {
  const ents = monthEntries(y, m).sort((a,b) => a.date > b.date ? 1 : -1);
  let rows = '';
  let lastDate = '';
  let dayGroup = [];

  function flushDayTotal() {
    if (!dayGroup.length) return;
    let inc = 0, exp = 0;
    dayGroup.forEach(e => { if (e.type==='income') inc += +e.amount; else exp += +e.amount; });
    const net = inc - exp;
    rows += `<div class="day-total-row">
      <span class="dt-label">Day total</span>
      <span class="dt-values">
        <span class="dt-income">+${fmt(inc)}</span>
        <span class="dt-expense">-${fmt(exp)}</span>
        <span class="dt-net" style="color:${net>=0?'var(--green)':'var(--red)'}">${net<0?'-':''}${fmt(net)}</span>
      </span>
    </div>`;
    dayGroup = [];
  }

  ents.forEach(e => {
    if (e.date !== lastDate) {
      flushDayTotal();
      const d = new Date(e.date + 'T00:00:00');
      rows += `<div class="date-divider">${d.toLocaleDateString('en-US', {weekday:'short', month:'short', day:'numeric'})}</div>`;
      lastDate = e.date;
    }
    rows += entryRow(e);
    dayGroup.push(e);
  });
  flushDayTotal();

  if (!rows) rows = `<div class="empty-state"><div class="icon">📋</div>No entries this month yet.</div>`;

  return `<div class="panel">
    <div class="panel-header"><h3>All entries — ${MONTHS[m]}</h3>
      <button class="add-btn" data-action="add-entry" data-date="${todayStr()}">+ Add entry</button>
    </div>
    ${rows}
  </div>`;
}

function renderRecurring() {
  const freqLabel = {
    weekly: 'Every week', biweekly: 'Every 2 weeks', triweekly: 'Every 3 weeks',
    monthly: 'Every month', bimonthly: 'Every 2 months', quarterly: 'Every 3 months',
    semiannual: 'Every 6 months', annual: 'Every year'
  };
  const rows = Object.values(state.recurring).map(r => `
    <div class="recur-row">
      <div class="entry-icon ${r.type}">${r.type==='income'?'↓':'↑'}</div>
      <div class="entry-info">
        <div class="entry-name">${r.name}</div>
        <div class="recur-freq">${freqLabel[r.frequency]||r.frequency} · from ${r.startDate}${r.endDate ? ' · ends ' + r.endDate : ''} · ${r.category}</div>
      </div>
      <div class="entry-amount ${r.type}">${r.type==='income'?'+':'-'}${fmt(+r.amount)}</div>
      <div class="recur-actions">
        <button class="edit-btn" data-action="edit-recurring" data-id="${r.id}" title="Edit">✎</button>
        <button class="del-btn"  data-action="del-recurring"  data-id="${r.id}" title="Delete">✕</button>
      </div>
    </div>`).join('');

  return `<div class="panel">
    <div class="panel-header"><h3>Recurring income & expenses</h3>
      <button class="add-btn" data-action="add-recurring">+ Add recurring</button>
    </div>
    ${rows || '<div class="empty-state"><div class="icon">🔄</div>Add recurring items like rent, salary, or subscriptions.</div>'}
  </div>`;
}

function entryRow(e) {
  const recurTag = (e.isRecurring || e.isInstance) ? `<span class="recur-tag">recurring</span>` : '';
  const editedTag = e.isOverridden ? `<span class="recur-tag" style="background:var(--blue-bg);color:var(--blue)">edited</span>` : '';
  const by = e.addedBy ? ` · ${e.addedBy}` : '';
  let actions;
  if (e.isInstance) {
    const baseId = e.id.replace(/_\d{4}-\d{2}-\d{2}$/, '');
    const schedDate = e.scheduledDate || e.date; // fallback for legacy instances
    actions = `
      <button class="edit-btn" data-action="edit-instance" data-base-id="${baseId}" data-date="${schedDate}" title="Edit this occurrence">✎</button>
      <button class="del-btn"  data-action="del-instance"  data-base-id="${baseId}" data-date="${schedDate}" title="Remove this occurrence">✕</button>`;
  } else {
    actions = `
      <button class="edit-btn" data-action="edit-entry" data-id="${e.id}" title="Edit entry">✎</button>
      <button class="del-btn"  data-action="del-entry"  data-id="${e.id}" title="Delete entry">✕</button>`;
  }
  return `<div class="entry-row">
    <div class="entry-icon ${e.type}">${e.type==='income'?'↓':'↑'}</div>
    <div class="entry-info">
      <div class="entry-name">${e.name}${recurTag}${editedTag}</div>
      <div class="entry-meta">${e.category||'Uncategorized'}${by}</div>
    </div>
    <div class="entry-amount ${e.type}">${e.type==='income'?'+':'-'}${fmt(+e.amount)}</div>
    <div class="recur-actions">${actions}</div>
  </div>`;
}

// ─── Modals ───────────────────────────────
function openEntryModal(defaultDate, existingEntry) {
  // existingEntry = full entry object when editing, null when adding
  const existing = existingEntry || null;
  let type = existing ? existing.type : 'expense';

  const catOptions = ['Housing','Food & dining','Transportation','Utilities','Healthcare','Entertainment','Shopping','Savings','Income','Other'];
  const catOpts = catOptions.map(c =>
    `<option ${existing && existing.category === c ? 'selected' : ''}>${c}</option>`
  ).join('');

  document.getElementById('modal-root').innerHTML = `
  <div class="modal-backdrop" id="modal-backdrop">
    <div class="modal">
      <h2>${existing ? 'Edit entry' : 'Add entry'}</h2>
      <div class="form-group">
        <label>Type</label>
        <div class="type-toggle">
          <button class="type-btn expense ${type==='expense'?'active':''}" id="type-expense-btn">↑ Expense</button>
          <button class="type-btn income  ${type==='income' ?'active':''}" id="type-income-btn">↓ Income</button>
        </div>
      </div>
      <div class="form-group"><label>Name</label><input id="f-name" placeholder="e.g. Groceries" value="${existing ? existing.name : ''}" /></div>
      <div class="form-group"><label>Amount ($)</label><input id="f-amount" type="number" min="0" step="0.01" placeholder="0.00" value="${existing ? existing.amount : ''}" /></div>
      <div class="form-group"><label>Date</label><input id="f-date" type="date" value="${existing ? existing.date : defaultDate}" /></div>
      <div class="form-group"><label>Category</label><select id="f-cat">${catOpts}</select></div>
      <div class="form-group"><label>Added by</label><input id="f-by" placeholder="Your name (optional)" value="${existing ? (existing.addedBy || '') : ''}" /></div>
      <div class="modal-actions">
        <button class="btn-cancel" id="modal-cancel">Cancel</button>
        <button class="btn-save" id="modal-save">${existing ? 'Save changes' : 'Save entry'}</button>
      </div>
    </div>
  </div>`;

  const setType = t => {
    type = t;
    document.getElementById('type-expense-btn').className = 'type-btn expense' + (t==='expense'?' active':'');
    document.getElementById('type-income-btn').className  = 'type-btn income'  + (t==='income' ?' active':'');
  };
  document.getElementById('type-expense-btn').addEventListener('click', () => setType('expense'));
  document.getElementById('type-income-btn').addEventListener('click',  () => setType('income'));
  document.getElementById('modal-cancel').addEventListener('click', closeModal);
  document.getElementById('modal-backdrop').addEventListener('click', e => { if (e.target.id==='modal-backdrop') closeModal(); });
  document.getElementById('modal-save').addEventListener('click', async () => {
    const name   = document.getElementById('f-name').value.trim();
    const amount = parseFloat(document.getElementById('f-amount').value);
    const date   = document.getElementById('f-date').value;
    const cat    = document.getElementById('f-cat').value;
    const by     = document.getElementById('f-by').value.trim();
    if (!name || !amount || !date) return;
    if (existing) {
      // Overwrite existing entry, preserving id and createdAt
      await set(ref(db, 'entries/' + existing.id), {
        ...existing, type, name, amount, date, category: cat, addedBy: by, updatedAt: Date.now()
      });
    } else {
      const newRef = push(ref(db, 'entries'));
      await set(newRef, { id: newRef.key, type, name, amount, date, category: cat, addedBy: by, createdAt: Date.now() });
    }
    closeModal();
  });
}

function openRecurModal(existingId) {
  const existing = existingId ? state.recurring[existingId] : null;
  let type = existing ? existing.type : 'expense';

  const freqOptions = [
    ['weekly',     'Every week'],
    ['biweekly',   'Every 2 weeks'],
    ['triweekly',  'Every 3 weeks'],
    ['monthly',    'Every month'],
    ['bimonthly',  'Every 2 months'],
    ['quarterly',  'Every 3 months'],
    ['semiannual', 'Every 6 months'],
    ['annual',     'Every year'],
  ];

  const freqOpts = freqOptions.map(([val, label]) =>
    `<option value="${val}" ${existing && existing.frequency === val ? 'selected' : ''}>${label}</option>`
  ).join('');

  const catOptions = ['Housing','Food & dining','Transportation','Utilities','Healthcare','Entertainment','Shopping','Savings','Income','Other'];
  const catOpts = catOptions.map(c =>
    `<option ${existing && existing.category === c ? 'selected' : ''}>${c}</option>`
  ).join('');

  document.getElementById('modal-root').innerHTML = `
  <div class="modal-backdrop" id="modal-backdrop">
    <div class="modal">
      <h2>${existing ? 'Edit recurring entry' : 'Add recurring entry'}</h2>
      <div class="form-group">
        <label>Type</label>
        <div class="type-toggle">
          <button class="type-btn expense ${type==='expense'?'active':''}" id="type-expense-btn">↑ Expense</button>
          <button class="type-btn income  ${type==='income' ?'active':''}" id="type-income-btn">↓ Income</button>
        </div>
      </div>
      <div class="form-group"><label>Name</label><input id="f-name" placeholder="e.g. Rent, Paycheck" value="${existing ? existing.name : ''}" /></div>
      <div class="form-group"><label>Amount ($)</label><input id="f-amount" type="number" min="0" step="0.01" placeholder="0.00" value="${existing ? existing.amount : ''}" /></div>
      <div class="form-group"><label>Start date</label><input id="f-date" type="date" value="${existing ? existing.startDate : todayStr()}" /></div>
      <div class="form-group"><label>Frequency</label><select id="f-freq">${freqOpts}</select></div>
      <div class="form-group"><label>Category</label><select id="f-cat">${catOpts}</select></div>
      <div class="form-group">
        <label>End date <span style="font-weight:400;color:var(--text-3)">(optional — leave blank to repeat forever)</span></label>
        <input id="f-end-date" type="date" value="${existing && existing.endDate ? existing.endDate : ''}" />
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" id="modal-cancel">Cancel</button>
        <button class="btn-save" id="modal-save">${existing ? 'Save changes' : 'Save recurring'}</button>
      </div>
    </div>
  </div>`;

  const setType = t => {
    type = t;
    document.getElementById('type-expense-btn').className = 'type-btn expense' + (t==='expense'?' active':'');
    document.getElementById('type-income-btn').className  = 'type-btn income'  + (t==='income' ?' active':'');
  };
  document.getElementById('type-expense-btn').addEventListener('click', () => setType('expense'));
  document.getElementById('type-income-btn').addEventListener('click',  () => setType('income'));
  document.getElementById('modal-cancel').addEventListener('click', closeModal);
  document.getElementById('modal-backdrop').addEventListener('click', e => { if (e.target.id==='modal-backdrop') closeModal(); });
  document.getElementById('modal-save').addEventListener('click', async () => {
    const name      = document.getElementById('f-name').value.trim();
    const amount    = parseFloat(document.getElementById('f-amount').value);
    const startDate = document.getElementById('f-date').value;
    const freq      = document.getElementById('f-freq').value;
    const cat       = document.getElementById('f-cat').value;
    const endDate   = document.getElementById('f-end-date').value || null;
    if (!name || !amount || !startDate) return;
    const id = existing ? existing.id : ('r' + Date.now());
    const payload = { id, type, name, amount, startDate, frequency: freq, category: cat, isRecurring: true };
    if (endDate) payload.endDate = endDate;
    // Preserve existing skippedDates and overrides when editing
    if (existing && existing.skippedDates) payload.skippedDates = existing.skippedDates;
    if (existing && existing.overrides)    payload.overrides    = existing.overrides;
    await set(ref(db, 'recurring/' + id), payload);
    closeModal();
  });
}

function openBalanceModal() {
  const today = todayStr();
  const { value: runningBal, hasAcct } = calcDailyBalance(today);
  const displayRunning = hasAcct ? fmt(runningBal) : null;

  document.getElementById('modal-root').innerHTML = `
  <div class="modal-backdrop" id="modal-backdrop">
    <div class="modal">
      <h2>Update account balance</h2>
      ${displayRunning ? `
      <div style="background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;margin-bottom:1rem;display:flex;justify-content:space-between;align-items:center;">
        <span style="font-size:12px;color:var(--text-3);font-weight:500;">Running balance today</span>
        <span style="font-size:16px;font-weight:600;color:${runningBal>=0?'var(--green)':'var(--red)'}">${runningBal<0?'-':''}${displayRunning}</span>
      </div>` : ''}
      <p style="font-size:12px;color:var(--text-2);margin-bottom:1rem;line-height:1.5;">Enter your actual bank balance. The difference will be logged as an adjustment entry on today's date.</p>
      <div class="form-group">
        <label>Actual account balance ($)</label>
        <input id="f-balance" type="number" step="0.01" placeholder="e.g. 3450.00" />
      </div>
      <div id="adjustment-preview" style="font-size:12px;color:var(--text-3);margin-top:-6px;margin-bottom:10px;min-height:18px;"></div>
      <div class="form-group">
        <label>Updated by</label>
        <input id="f-balance-by" placeholder="Your name (optional)" />
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" id="modal-cancel">Cancel</button>
        <button class="btn-save" id="modal-save">Save &amp; log adjustment</button>
      </div>
    </div>
  </div>`;

  // Live preview of adjustment as user types
  const preview = document.getElementById('adjustment-preview');
  document.getElementById('f-balance').addEventListener('input', function() {
    const val = parseFloat(this.value);
    if (isNaN(val) || !hasAcct) { preview.textContent = ''; return; }
    const diff = val - runningBal;
    if (Math.abs(diff) < 0.01) { preview.textContent = 'No adjustment needed'; preview.style.color = 'var(--text-3)'; return; }
    const label = diff > 0 ? `+${fmt(diff)} income adjustment will be added` : `-${fmt(Math.abs(diff))} expense adjustment will be added`;
    preview.textContent = label;
    preview.style.color = diff > 0 ? 'var(--green)' : 'var(--red)';
  });

  document.getElementById('modal-cancel').addEventListener('click', closeModal);
  document.getElementById('modal-backdrop').addEventListener('click', e => { if (e.target.id==='modal-backdrop') closeModal(); });
  document.getElementById('modal-save').addEventListener('click', async () => {
    const val = parseFloat(document.getElementById('f-balance').value);
    if (isNaN(val)) return;
    const updatedAt = Date.now();
    const by = document.getElementById('f-balance-by').value.trim();

    // If we have a running balance, calculate the difference and log an adjustment entry
    if (hasAcct) {
      const diff = val - runningBal;
      if (Math.abs(diff) >= 0.01) {
        const adjType = diff > 0 ? 'income' : 'expense';
        const newRef = push(ref(db, 'entries'));
        await set(newRef, {
          id: newRef.key,
          type: adjType,
          name: 'Balance adjustment',
          amount: Math.abs(diff),
          date: today,
          category: 'Other',
          addedBy: by || 'Balance update',
          createdAt: updatedAt,
          isAdjustment: true
        });
      }
    }

    // Store balance as object with timestamp
    const payload = { value: val, updatedAt };
    if (by) payload.updatedBy = by;
    await set(ref(db, 'accountBalance'), payload);

    // Anchor as monthly start balance
    const now = new Date();
    const key = monthKey(now.getFullYear(), now.getMonth());
    await set(ref(db, 'monthlyBalances/' + key), val);

    // Write intraday snapshot — use the new val so future daily balance calc is correct
    await set(ref(db, 'balanceSnapshots/' + today), { value: val, updatedAt });
    closeModal();
  });
  setTimeout(() => document.getElementById('f-balance')?.focus(), 50);
}

function openInstanceDeleteModal(baseId, date) {
  const r = state.recurring[baseId];
  const name = r ? r.name : 'this entry';
  const prettyDate = new Date(date + 'T00:00:00').toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' });
  document.getElementById('modal-root').innerHTML = `
  <div class="modal-backdrop" id="modal-backdrop">
    <div class="modal">
      <h2>Remove recurring entry</h2>
      <p style="font-size:13px;color:var(--text-2);margin-bottom:1.25rem;line-height:1.6">
        What would you like to do with <strong>${name}</strong>?
      </p>
      <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:1.25rem">
        <button id="skip-once-btn" style="text-align:left;padding:12px 14px;border:1px solid var(--border-strong);border-radius:var(--radius);background:none;cursor:pointer;font-family:inherit;color:var(--text);transition:background .1s">
          <div style="font-size:13px;font-weight:600;margin-bottom:2px">Skip ${prettyDate} only</div>
          <div style="font-size:12px;color:var(--text-3)">Remove just this one occurrence — future ones continue as normal</div>
        </button>
        <button id="stop-future-btn" style="text-align:left;padding:12px 14px;border:1px solid var(--border-strong);border-radius:var(--radius);background:none;cursor:pointer;font-family:inherit;color:var(--text);transition:background .1s">
          <div style="font-size:13px;font-weight:600;margin-bottom:2px">Stop after a date…</div>
          <div style="font-size:12px;color:var(--text-3)">Set an end date so this stops recurring from a chosen point</div>
        </button>
        <button id="delete-all-btn" style="text-align:left;padding:12px 14px;border:1px solid var(--red-bg);border-radius:var(--radius);background:none;cursor:pointer;font-family:inherit;color:var(--red);transition:background .1s">
          <div style="font-size:13px;font-weight:600;margin-bottom:2px">Delete all occurrences</div>
          <div style="font-size:12px;color:var(--red);opacity:.7">Permanently remove this recurring entry entirely</div>
        </button>
      </div>
      <div class="modal-actions" style="margin-top:0">
        <button class="btn-cancel" id="modal-cancel">Cancel</button>
      </div>
    </div>
  </div>`;

  // Hover effects
  ['skip-once-btn','stop-future-btn'].forEach(id => {
    const btn = document.getElementById(id);
    btn.addEventListener('mouseover', () => btn.style.background = 'var(--surface-2)');
    btn.addEventListener('mouseout',  () => btn.style.background = 'none');
  });
  const delAll = document.getElementById('delete-all-btn');
  delAll.addEventListener('mouseover', () => delAll.style.background = 'var(--red-bg)');
  delAll.addEventListener('mouseout',  () => delAll.style.background = 'none');

  document.getElementById('modal-cancel').addEventListener('click', closeModal);
  document.getElementById('modal-backdrop').addEventListener('click', ev => { if (ev.target.id==='modal-backdrop') closeModal(); });

  document.getElementById('skip-once-btn').addEventListener('click', async () => {
    const path = `recurring/${baseId}/skippedDates/${date}`;
    await set(ref(db, path), true);
    closeModal();
  });

  document.getElementById('stop-future-btn').addEventListener('click', () => {
    closeModal();
    openStopRecurModal(baseId, date);
  });

  document.getElementById('delete-all-btn').addEventListener('click', async () => {
    await remove(ref(db, 'recurring/' + baseId));
    closeModal();
  });
}

function openStopRecurModal(baseId, fromDate) {
  // Default end date = the day before the selected instance
  const d = new Date(fromDate + 'T00:00:00');
  d.setDate(d.getDate() - 1);
  const defaultEnd = d.toISOString().slice(0, 10);
  const r = state.recurring[baseId];
  const name = r ? r.name : 'this entry';

  document.getElementById('modal-root').innerHTML = `
  <div class="modal-backdrop" id="modal-backdrop">
    <div class="modal">
      <h2>Stop recurring entry</h2>
      <p style="font-size:13px;color:var(--text-2);margin-bottom:1rem;line-height:1.5">
        Choose the last date <strong>${name}</strong> should appear. All occurrences after this date will be removed.
      </p>
      <div class="form-group">
        <label>Last occurrence date</label>
        <input id="f-end-date" type="date" value="${defaultEnd}" />
      </div>
